<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VOLCAP • P8 rig comparison</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #14161a; color: #e6e6e6;
      font: 13px/1.4 system-ui, sans-serif; overflow: hidden; }
    /* touch-action none: the canvas owns ALL touch gestures (orbit/pinch);
       without it mobile browsers pan/zoom the PAGE instead of the camera */
    #cv { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; touch-action: none; }
    #hud { position: fixed; top: 10px; left: 12px; z-index: 10; white-space: pre;
      background: rgba(0,0,0,.45); padding: 8px 10px; border-radius: 6px;
      font-variant-numeric: tabular-nums; pointer-events: none; }
    #rigs { position: fixed; top: 10px; right: 12px; z-index: 10; display: flex;
      flex-direction: column; gap: 6px; }
    #rigs button { background: rgba(0,0,0,.55); color: #e6e6e6; border: 1px solid #444;
      border-radius: 6px; padding: 7px 10px; text-align: left; cursor: pointer;
      font: inherit; }
    #rigs button.active { border-color: #7ab8ff; color: #cfe6ff; }
    #rigs .note { font-size: 11px; opacity: .75; }
    #bar { position: fixed; bottom: 10px; left: 12px; right: 12px; z-index: 10;
      display: flex; gap: 10px; align-items: center;
      background: rgba(0,0,0,.45); padding: 8px 10px; border-radius: 6px; }
    #play { width: 40px; background: none; color: #e6e6e6; border: 1px solid #555;
      border-radius: 5px; padding: 4px; cursor: pointer; font: inherit; }
    #scrub { flex: 1; }
    #err { position: fixed; bottom: 56px; left: 12px; right: 12px; z-index: 10;
      color: #ff8080; white-space: pre-wrap; max-height: 40vh; overflow: auto; }
  </style>
</head>
<body>
  <canvas id="cv"></canvas>
  <div id="hud">booting…</div>
  <div id="rigs"></div>
  <div id="bar">
    <button id="play">❚❚</button>
    <input id="scrub" type="range" min="0" max="119" value="0" step="1" />
  </div>
  <div id="err"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js",
        "three/addons/": "./vendor/three-addons/",
        "@sparkjsdev/spark": "./vendor/spark.module.js"
      }
    }
  </script>
  <script type="module" src="./src/p8_main.js"></script>
</body>
</html>
